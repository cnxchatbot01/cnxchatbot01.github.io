<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงเวลาเข้า-ออกงาน (Time Tracking)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <!-- Card Container -->
    <div class="glass-card w-full max-w-md rounded-2xl p-8 space-y-6 relative overflow-hidden">
        
        <!-- Decorative Background Shapes -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-400 rounded-full mix-blend-multiply filter blur-2xl opacity-30"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-green-400 rounded-full mix-blend-multiply filter blur-2xl opacity-30"></div>

        <!-- Header -->
        <div class="text-center relative z-10">
            <div class="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm">
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">ระบบลงเวลาทำงาน</h1>
            <p class="text-gray-500 text-sm mt-1">กรุณาเข้าสู่ระบบด้วย LINE เพื่อดำเนินการ</p>
        </div>

        <!-- Login Section (แสดงตอนแรกถ้ายังไม่ Login) -->
        <div id="loginSection" class="text-center py-4">
            <button id="btnLogin" onclick="logIn()" class="bg-[#00B900] hover:bg-[#009900] text-white font-medium py-3.5 px-6 rounded-xl w-full transition duration-300 flex items-center justify-center gap-3 shadow-lg shadow-green-200">
                <svg viewBox="0 0 24 24" class="w-6 h-6 fill-current"><path d="M24 10.304c0-5.369-5.383-9.738-12-9.738-6.616 0-12 4.369-12 9.738 0 4.814 4.269 8.846 10.038 9.608.391.084.922.258 1.057.592.114.281.072.71-.035 1.011-.132.378-.855 2.502-.977 2.915-.152.518-.328 1.144 1.139.526 1.467-.618 7.913-4.665 10.428-7.708 1.569-1.895 2.35-4.113 2.35-6.944zm-13.064 3.033h-2.146c-.347 0-.628-.28-.628-.628v-5.26c0-.348.281-.628.628-.628.348 0 .628.28.628.628v4.632h1.518c.348 0 .628.28.628.628 0 .348-.28.628-.628.628zm3.621 0h-1.256c-.348 0-.628-.28-.628-.628v-5.26c0-.348.281-.628.628-.628.348 0 .628.28.628.628v5.26c0 .348-.281.628-.628.628zm3.784-2.81c0 .348-.28.628-.628.628h-1.518v1.554c0 .348-.281.628-.628.628-.348 0-.628-.28-.628-.628v-5.26c0-.348.281-.628.628-.628h2.146c.348 0 .628.28.628.628 0 .348-.28.628-.628.628h-1.518v1.196h1.518c.348 0 .628.28.628.628zm2.46-.628c-.28 0-.543-.178-.628-.485l-.364-1.321h-1.802l-.365 1.321c-.085.307-.348.485-.628.485-.15 0-.295-.052-.41-.168-.184-.183-.242-.456-.145-.694l1.503-6.177c.189-.594.757-.992 1.385-.992.627 0 1.196.398 1.385.992l1.503 6.177c.097.238.038.511-.146.694-.114.116-.259.168-.41.168zm-1.838-3.08l-.51 1.848h1.02l-.51-1.848z"/></svg>
                เข้าสู่ระบบด้วย LINE
            </button>
        </div>

        <!-- App Section (ซ่อนไว้ก่อนจนกว่าจะ Login สำเร็จ) -->
        <div id="appSection" class="hidden relative z-10 space-y-6">
            
            <!-- User Profile Card -->
            <div class="flex items-center space-x-4 bg-white/60 p-4 rounded-xl border border-white/50 shadow-sm transition-all hover:bg-white/80">
                <img id="profileImage" src="" alt="Profile" class="w-14 h-14 rounded-full border-2 border-white shadow-sm object-cover">
                <div>
                    <h2 id="displayName" class="font-semibold text-gray-800">กำลังโหลด...</h2>
                    <p class="text-xs text-gray-500 flex items-center gap-1 mt-0.5" id="statusMessage">
                        <span class="w-2 h-2 rounded-full bg-green-500"></span> พร้อมทำรายการ
                    </p>
                </div>
            </div>

            <!-- Form -->
            <form id="timeForm" onsubmit="handleFormSubmit(event)" class="space-y-5">
                
                <!-- เลือกประเภทรายการ -->
                <div class="space-y-3">
                    <label class="block text-sm font-medium text-gray-700">เลือกประเภทรายการ <span class="text-red-500">*</span></label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="cursor-pointer relative">
                            <input type="radio" name="actionType" value="เข้างาน" class="peer sr-only" required>
                            <div class="rounded-xl border-2 border-transparent bg-white shadow-sm p-4 text-center hover:bg-blue-50 peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:shadow-blue-100 transition-all">
                                <span class="block text-2xl mb-1">📥</span>
                                <span class="block font-semibold text-blue-700">เข้างาน</span>
                            </div>
                        </label>
                        <label class="cursor-pointer relative">
                            <input type="radio" name="actionType" value="ออกงาน" class="peer sr-only">
                            <div class="rounded-xl border-2 border-transparent bg-white shadow-sm p-4 text-center hover:bg-red-50 peer-checked:border-red-500 peer-checked:bg-red-50 peer-checked:shadow-red-100 transition-all">
                                <span class="block text-2xl mb-1">📤</span>
                                <span class="block font-semibold text-red-600">ออกงาน</span>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- หมายเหตุ -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">หมายเหตุ (ถ้ามี)</label>
                    <textarea id="noteInput" rows="2" class="w-full rounded-xl border-gray-200 bg-white/80 focus:border-blue-500 focus:ring-blue-500 focus:bg-white border p-3 outline-none transition-all shadow-sm" placeholder="เช่น ทำงานที่บ้าน, ออกไปพบลูกค้า..."></textarea>
                </div>

                <!-- ตำแหน่งที่ตั้ง (GPS) -->
                <div class="flex items-center space-x-2 text-sm text-gray-600 bg-gray-50 p-3 rounded-lg border border-gray-100 shadow-inner">
                    <svg class="w-5 h-5 text-gray-400" id="locationIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <span id="locationText">กำลังดึงตำแหน่งที่ตั้ง...</span>
                </div>

                <!-- ปุ่ม Submit -->
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3.5 px-4 rounded-xl shadow-lg shadow-blue-200 transition-all transform active:scale-[0.98] disabled:opacity-70 disabled:cursor-not-allowed disabled:transform-none flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    ยืนยันบันทึกข้อมูล
                </button>
            </form>
        </div>
        
        <!-- Footer -->
        <div class="text-center text-xs text-gray-400 mt-4 relative z-10">
            Powered by LINE LIFF & Telegram
        </div>
    </div>

    <!-- ========================================== -->
    <!-- สคริปต์การทำงาน (JavaScript)                   -->
    <!-- ========================================== -->
    <script>
        // ----------------------------------------------------
        // 🔴 ตั้งค่าตัวแปรระบบของคุณที่นี่ (CONFIGURATION)
        // ----------------------------------------------------
        const LIFF_ID = "2009451841-Vaq36kwM"; // แทนที่ด้วย LIFF ID จาก LINE Developers
        const TELEGRAM_BOT_TOKEN = "8048878743:AAH2czdhQ2SPICyGANq-DzHMMJdLfzeJmUA"; // แทนที่ด้วย Telegram Bot Token จาก BotFather
        const TELEGRAM_CHAT_ID = "-5283425209"; // แทนที่ด้วย Chat ID ที่ต้องการส่งเข้า (อาจจะเป็น ID กลุ่มหรือส่วนตัว)
        // ----------------------------------------------------

        let userProfile = null;
        let userLocation = null;

        // ฟังก์ชันเริ่มต้น (Init)
        async function initializeLiff() {
            try {
                // ถ้ายังไม่ได้แก้ไข LIFF_ID ให้แสดงโหมดจำลองภาพรวม (Mock Mode) ไปก่อน
                if(LIFF_ID === "2009451841-Vaq36kwM") {
                    console.warn("ยังไม่ได้ตั้งค่า LIFF ID - ทำงานในโหมดจำลอง (Mock Mode)");
                    showAppSection({
                        displayName: "ผู้ใช้งานทดสอบ",
                        pictureUrl: "https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff&size=150",
                        userId: "mock_user_12345"
                    });
                    return;
                }

                // สั่ง Initialize LIFF
                await liff.init({ liffId: LIFF_ID });
                
                // ถ้ายืนยันตัวตนแล้ว (Login แล้ว)
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    showAppSection(profile);
                } else {
                    // ถ้ายัง ให้แสดงปุ่มล็อกอิน
                    document.getElementById('loginSection').classList.remove('hidden');
                }
            } catch (err) {
                console.error('LIFF Init Error:', err);
                Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อระบบ LINE ได้ กรุณาลองใหม่', 'error');
            }
        }

        // ฟังก์ชันเมื่อกดปุ่ม Login แบบแมนนวล
        function logIn() {
            if(LIFF_ID === "2009451841-Vaq36kwM") {
                showAppSection({
                    displayName: "ผู้ใช้งานทดสอบ",
                    pictureUrl: "https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff&size=150",
                    userId: "mock_user_12345"
                });
                return;
            }
            liff.login();
        }

        // ฟังก์ชันแสดงหน้าต่างหลักของแอป
        function showAppSection(profile) {
            userProfile = profile;
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
            
            // แสดงข้อมูลผู้ใช้
            document.getElementById('profileImage').src = profile.pictureUrl || 'https://ui-avatars.com/api/?name=U&background=random';
            document.getElementById('displayName').textContent = profile.displayName;

            // พยายามดึงพิกัด Location
            getLocation();
        }

        // ฟังก์ชันดึงพิกัด GPS
        function getLocation() {
            const locText = document.getElementById('locationText');
            const locIcon = document.getElementById('locationIcon');
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userLocation = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude
                        };
                        locText.textContent = `พิกัดที่พบ: ${userLocation.lat.toFixed(5)}, ${userLocation.lng.toFixed(5)}`;
                        locText.classList.remove('text-gray-600');
                        locText.classList.add('text-green-600');
                        locIcon.classList.remove('text-gray-400');
                        locIcon.classList.add('text-green-500');
                    },
                    (error) => {
                        locText.textContent = "ไม่สามารถเข้าถึงตำแหน่งที่ตั้งได้";
                        locText.classList.add('text-red-500');
                        locIcon.classList.add('text-red-400');
                    },
                    { enableHighAccuracy: true }
                );
            } else {
                locText.textContent = "เบราว์เซอร์นี้ไม่รองรับการดึง GPS";
            }
        }

        // ฟังก์ชันเมื่อกด ยืนยันบันทึกข้อมูล
        async function handleFormSubmit(e) {
            e.preventDefault();
            
            const actionType = document.querySelector('input[name="actionType"]:checked').value;
            const note = document.getElementById('noteInput').value;
            const btn = document.getElementById('submitBtn');
            const originalBtnHtml = btn.innerHTML;
            
            // ป้องกันการกดปุ่มซ้ำ
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                กำลังบันทึกข้อมูล...
            `;

            try {
                // สร้าง Timestamp ปัจจุบัน
                const now = new Date().toLocaleString('th-TH', { dateStyle: 'long', timeStyle: 'medium' });
                
                // 1) ส่งแจ้งเตือนไปยังระบบ Telegram (ทำงานจริงเมื่อใส่ Token)
                await sendToTelegram(actionType, note, now);
                
                // 2) [ทางเลือก] บันทึกข้อมูลลงใน Database ของคุณ (เช่นส่งไป Google Sheets หรือ API ส่วนตัว)
                // await fetch('https://your-api.com/save', { method: 'POST', body: JSON.stringify({...}) });

                Swal.fire({
                    icon: 'success',
                    title: 'บันทึกสำเร็จ!',
                    text: `บันทึกรายการ "${actionType}" ของคุณเรียบร้อยแล้ว`,
                    confirmButtonColor: '#3b82f6',
                    confirmButtonText: 'ตกลง'
                }).then(() => {
                    // หากเปิดผ่าน LINE App จะสั่งให้ปิดหน้าต่าง LIFF ทันที
                    if (typeof liff !== 'undefined' && liff.isInClient()) {
                        liff.closeWindow();
                    } else {
                        // ถ้าเปิดบนเบราว์เซอร์ปกติ ให้รีโหลดหน้าจอใหม่
                        window.location.reload();
                    }
                });

            } catch (error) {
                console.error("Submit Error:", error);
                Swal.fire({
                    icon: 'error',
                    title: 'เกิดข้อผิดพลาด',
                    text: 'ไม่สามารถบันทึกข้อมูลได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ตหรือตั้งค่า Telegram Token',
                    confirmButtonColor: '#ef4444'
                });
            } finally {
                // เปิดให้ปุ่มกดได้อีกครั้ง
                btn.disabled = false;
                btn.innerHTML = originalBtnHtml;
            }
        }

        // ฟังก์ชันจัดการการส่ง Request ไปยัง Telegram Bot API
        async function sendToTelegram(actionType, note, timestamp) {
            // ถ้ายังไม่ได้แก้ไขข้อมูล ตั้งไว้เป็น mock
            if (TELEGRAM_BOT_TOKEN === "YOUR_TELEGRAM_BOT_TOKEN") {
                console.log("Mock Telegram Request Data:", { actionType, note, timestamp, userLocation });
                await new Promise(r => setTimeout(r, 800)); // จำลองการดีเลย์โหลด API
                return true; 
            }

            // เตรียมข้อมูล Location แนบไปกับข้อความ
            const locationLink = userLocation 
                ? `[ดูพิกัดบนแผนที่](https://www.google.com/maps?q=${userLocation.lat},${userLocation.lng})`
                : 'ไม่ระบุ / ไม่สามารถค้นหาพิกัดได้';

            // จัดรูปแบบข้อความ (Markdown)
            const emoji = actionType === 'เข้างาน' ? '📥' : '📤';
            const message = `
${emoji} *รายการลงเวลาใหม่*
━━━━━━━━━━━━━━━━━━━━
👤 *ชื่อ:* ${userProfile.displayName}
🆔 *UID:* \`${userProfile.userId}\`
📝 *ประเภท:* ${actionType}
⏰ *เวลา:* ${timestamp}
📍 *ตำแหน่ง:* ${locationLink}
💬 *หมายเหตุ:* ${note || '-'}
━━━━━━━━━━━━━━━━━━━━
            `.trim();

            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown',
                    disable_web_page_preview: true
                })
            });

            if (!response.ok) {
                throw new Error(`Telegram API Error: ${response.status}`);
            }
            
            return response.json();
        }

        // เริ่มโหลดการทำงานตอนเปิดหน้าเว็บ
        window.addEventListener('DOMContentLoaded', initializeLiff);

    </script>
</body>
</html>
